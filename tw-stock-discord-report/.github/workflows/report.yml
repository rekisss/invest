name: Discord Report Test

on:
  # 允許你在 GitHub 上手動點 Run
  workflow_dispatch:

  # 每週一到五 UTC 10:00 執行（之後可改台灣時間）
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  send-discord-report:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行程式並發送 Discord 訊息
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py
