name: Taiwan Hybrid Monitor

on:
  workflow_dispatch:
  schedule:
    # 09:00-13:55 Asia/Taipei every 5 minutes on weekdays.
    - cron: "*/5 1-5 * * 1-5"

concurrency:
  group: taiwan-hybrid-monitor
  cancel-in-progress: false

jobs:
  hybrid-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hybrid monitor
        env:
          TZ: Asia/Taipei
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py --mode hybrid-monitor --stocks auto --end "$(date +%F)" --max-universe 40 --top-n 10 --watch-top 5 --max-price 120 --prefer-lower-price --output output --notify

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-hybrid-monitor
          path: |
            output/hybrid_monitor_report.xlsx
          if-no-files-found: warn
