name: Discord Report Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  send-discord-report:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行程式並發送 Discord 訊息
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINMIND_USER_ID: ${{ secrets.FINMIND_USER_ID }}
          FINMIND_PASSWORD: ${{ secrets.FINMIND_PASSWORD }}
        run: |
          python main.py

      - name: 上傳 Excel 報表
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: output/report.xlsx