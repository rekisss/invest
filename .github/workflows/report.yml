name: Taiwan Hybrid Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 1-5 * * 1-5"

jobs:
  hybrid-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hybrid monitor
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py --mode hybrid-monitor --stocks watchlist.csv --end $(date +%F) --watch-top 5 --output output --notify

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-hybrid-monitor
          path: |
            output/hybrid_monitor_report.xlsx
