name: 全市場彙整 TOP 20 (02:00 CST 週二~週六)

# 補跑由 full_market_scan.yml 負責（23:00、00:00、01:00 CST 各補一批）
# 02:00 CST 彙整所有批次，送出 TOP 20 Discord 通知

on:
  schedule:
    - cron: "0 18 * * 1-5"   # 02:00 CST = 18:00 UTC（週二到週六 CST，= 週一到週五 UTC）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect missing batches
        id: detect
        run: |
          MISSING=()
          for i in $(seq 0 7); do
            PAD=$(printf "%02d" $i)
            if [ ! -f "output/full_scan/batch_${PAD}.csv" ]; then
              MISSING+=($i)
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "缺少批次：${MISSING[*]}"
            echo "missing=${MISSING[*]}" >> "$GITHUB_OUTPUT"
          else
            echo "所有批次齊全"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - name: Aggregate and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode aggregate \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --top-n 20 \
            --output output \
            --notify

      - name: Commit cleanup (batch files removed by aggregate)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add output/full_scan/ || true
          git diff --staged --quiet || git commit -m "scan: 清除批次檔案 $(TZ=Asia/Taipei date +%Y-%m-%d)"
          git push || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場彙整失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d) · 缺少批次：${{ steps.detect.outputs.missing || '未知' }} · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
