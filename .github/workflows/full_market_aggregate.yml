name: 全市場彙整 TOP 20 (05:00 CST)

# 在 8 批掃描完成後（約 05:00 CST），彙整所有批次結果，選出前 20 名

on:
  schedule:
    - cron: "0 21 * * 2-6"   # 05:00 CST = 21:00 UTC（週二到週六，彙整前一天晚上的掃描）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Aggregate and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode aggregate \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --top-n 20 \
            --output output \
            --notify

      - name: Commit cleanup (batch files removed by aggregate)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add output/full_scan/ || true
          git diff --staged --quiet || git commit -m "scan: 清除批次檔案 $(TZ=Asia/Taipei date +%Y-%m-%d)"
          git push || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場彙整失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d) · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
