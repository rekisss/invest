name: 全市場彙整 TOP 20 (02:00 CST 週二~週六)

# 彙整所有 batch_*.csv，送出 TOP 20 Discord 通知
# 02:00 CST 固定彙整（批次數量依接力模式動態產生）

on:
  schedule:
    - cron: "0 18 * * 1-5"   # 02:00 CST = 18:00 UTC（週二到週六 CST）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 顯示掃描進度
        id: detect
        run: |
          BATCH_COUNT=$(ls output/full_scan/batch_[0-9][0-9].csv 2>/dev/null | wc -l)
          TOTAL_ROWS=0
          for f in output/full_scan/batch_[0-9][0-9].csv; do
            [ -f "$f" ] && TOTAL_ROWS=$(( TOTAL_ROWS + $(tail -n +2 "$f" | wc -l) ))
          done
          echo "批次數：$BATCH_COUNT，已掃股票：$TOTAL_ROWS 支"
          echo "batch_count=$BATCH_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_rows=$TOTAL_ROWS" >> "$GITHUB_OUTPUT"

      - name: Aggregate and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode aggregate \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --top-n 20 \
            --output output \
            --notify

      - name: Commit cleanup (batch files removed by aggregate)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add -f output/full_scan/ || true
          git diff --staged --quiet || git commit -m "scan: 彙整完成，清除批次 $(TZ=Asia/Taipei date +%Y-%m-%d)"
          git push || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場彙整失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d) · 已掃批次：${{ steps.detect.outputs.batch_count || 0 }} · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
