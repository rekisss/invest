name: 全市場彙整 TOP 20 (20:00 CST 週二~週六)

# 1. 全局缺漏補掃（用 L token，此時 quota 已 reset）
# 2. 彙整所有 batch_*.csv，送出 TOP 20 Discord 通知
# 3. 清除批次 CSV（保留 XLSX 供歸檔）

on:
  # 全盤掃描2 完成後自動觸發（主要觸發方式）
  workflow_run:
    workflows: ["全盤掃描2（橫截面信號 + F-Score 補抓）"]
    types: [completed]
  # 排程保底：週二~週六 20:15 CST（UTC+8）= 12:15 UTC，確保掃描已完成
  schedule:
    - cron: '15 12 * * 2-6'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: Get current date (CST)
        id: date
        run: echo "date=$(TZ=Asia/Taipei date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore scan cache（取得當日掃描進度）
        uses: actions/cache/restore@v4
        with:
          path: output/full_scan
          key: finmind-scan-${{ steps.date.outputs.date }}-latest
          restore-keys: |
            finmind-scan-${{ steps.date.outputs.date }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 顯示掃描進度
        id: detect
        run: |
          BATCH_COUNT=$(ls output/full_scan/batch_*.csv 2>/dev/null | wc -l)
          TOTAL_ROWS=0
          for f in output/full_scan/batch_*.csv; do
            [ -f "$f" ] && TOTAL_ROWS=$(( TOTAL_ROWS + $(tail -n +2 "$f" | wc -l) ))
          done
          echo "批次數：$BATCH_COUNT，已掃股票：$TOTAL_ROWS 支"
          echo "batch_count=$BATCH_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_rows=$TOTAL_ROWS" >> "$GITHUB_OUTPUT"

      - name: Aggregate and notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py \
            --mode aggregate \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --top-n 20 \
            --output output \
            --notify

      - name: 上傳彙整 Excel（Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-run${{ github.run_number }}
          path: output/full_scan/*.xlsx
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit cleanup (batch files removed by aggregate)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add output/full_scan/ output/aggregate_latest.json || true
          git diff --staged --quiet || git commit -m "scan: 彙整完成 $(TZ=Asia/Taipei date +%Y-%m-%d)"
          git push || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場彙整失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d) · 已掃批次：${{ steps.detect.outputs.batch_count || 0 }} · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
