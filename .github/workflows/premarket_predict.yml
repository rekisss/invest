name: 盤前預測 (08:00 CST)

on:
  # schedule:
  #   - cron: '0 0 * * 1-5'   # 08:00 CST 週一~週五（台股開盤前）
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 通知 Discord：開始執行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"🔭 **盤前預測 開始** · ${TS} CST\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market prediction
        env:
          # 盤前預測改用帳號10（FINMIND_TOKEN_10）— 額度較足；沒設時自動退回原本的 FINMIND_TOKEN。
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN_10 || secrets.FINMIND_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PREMARKET_AI_KEY: ${{ secrets.PREMARKET_AI_KEY }}
        run: |
          python main.py \
            --mode predict \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --output output \
            --notify

      - name: Commit prediction JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp output/prediction_latest.json /tmp/prediction_latest.json
          cp output/prediction_history.json /tmp/prediction_history.json 2>/dev/null || true
          git stash --include-untracked
          git pull --rebase origin main
          git stash drop 2>/dev/null || true
          cp /tmp/prediction_latest.json output/prediction_latest.json
          cp /tmp/prediction_history.json output/prediction_history.json 2>/dev/null || true
          git add output/prediction_latest.json output/prediction_history.json || true
          git diff --cached --quiet || git commit -m "predict: 盤前預測 $(TZ=Asia/Taipei date +%Y-%m-%d)"
          git push

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **盤前預測執行失敗** · $(date -u +%Y-%m-%d) · 請檢查 GitHub Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
