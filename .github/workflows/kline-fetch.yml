name: K線資料更新

on:
  # schedule:
  #   - cron: '30 12 * * 2-6'   # 已停用，改由外部 cron 手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: K線增量抓取 + Notion 同步 + Excel 匯出
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_2:      ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3:      ${{ secrets.FINMIND_TOKEN_3 }}
          FINMIND_TOKEN_4:      ${{ secrets.FINMIND_TOKEN_4 }}
          FINMIND_TOKEN_5:      ${{ secrets.FINMIND_TOKEN_5 }}
          FINMIND_TOKEN_6:      ${{ secrets.FINMIND_TOKEN_6 }}
          FINMIND_TOKEN_7:      ${{ secrets.FINMIND_TOKEN_7 }}
          FINMIND_TOKEN_8:      ${{ secrets.FINMIND_TOKEN_8 }}
          FINMIND_TOKEN_9:      ${{ secrets.FINMIND_TOKEN_9 }}
          FINMIND_TOKEN_10:     ${{ secrets.FINMIND_TOKEN_10 }}
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
        run: python kline_fetch.py

      - name: Commit kline cache + Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp output/kline_cache.json /tmp/kline_cache.json
          cp output/kline_export.xlsx /tmp/kline_export.xlsx
          git stash --include-untracked
          git pull --rebase origin main
          git stash drop 2>/dev/null || true
          cp /tmp/kline_cache.json output/kline_cache.json
          cp /tmp/kline_export.xlsx output/kline_export.xlsx
          git add output/kline_cache.json output/kline_export.xlsx
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update kline_cache + kline_export.xlsx [skip ci]"
          git push
