name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows:
      - K線資料更新
      - 全市場掃描
      - 全盤掃描2（橫截面信號 + F-Score 補抓）
      - 全市場彙整 TOP 20 (20:00 CST 週二~週六)
      - 盤前預測 (08:00 CST)
      - 盤後總結 (14:15 CST)
      - 每日選股掃描 (19:00 CST)
      - 即時 TOP N 預覽 (手動觸發)
      - 回測 / 參數掃描 (手動觸發)
      - Collect Training Data (yfinance)
      - Train ML Model
      - 盤中事件監控 (09:00–13:30 CST)
      - 更新新聞語料庫
      - K線全量補跑（手動觸發）
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Deploy on push/dispatch always; for workflow_run, allow success OR failure
    # (partial scans may fail overall but still commit useful CSV data to main)
    if: github.event_name != 'workflow_run' || contains(fromJSON('["success","failure"]'), github.event.workflow_run.conclusion)
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build scan data JSON
        working-directory: web
        env:
          FINMIND_TOKEN:        ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_2:      ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3:      ${{ secrets.FINMIND_TOKEN_3 }}
          FINMIND_TOKEN_4:      ${{ secrets.FINMIND_TOKEN_4 }}
          FINMIND_TOKEN_5:      ${{ secrets.FINMIND_TOKEN_5 }}
          FINMIND_TOKEN_6:      ${{ secrets.FINMIND_TOKEN_6 }}
          FINMIND_TOKEN_7:      ${{ secrets.FINMIND_TOKEN_7 }}
          FINMIND_TOKEN_8:      ${{ secrets.FINMIND_TOKEN_8 }}
          FINMIND_TOKEN_9:      ${{ secrets.FINMIND_TOKEN_9 }}
          FINMIND_TOKEN_10:     ${{ secrets.FINMIND_TOKEN_10 }}
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/build-data.mjs

      - name: Build
        working-directory: web
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # GitHub Pages 後端偶爾回「Deployment failed, try again later」(暫時性,非 build 問題)。
      # 第一次失敗就自動重試一次,避免暫時性錯誤讓網站沒更新到。
      # 先等 30 秒再重試:失敗都發生在建立 deployment 後 ~5 秒,立刻重試容易撞到同一個後端狀態。
      - name: 等待 30 秒再重試
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages（重試一次，處理暫時性後端錯誤）
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
