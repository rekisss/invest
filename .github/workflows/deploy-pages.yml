name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows:
      - 全市場掃描
      - 全市場彙整 TOP 20 (20:00 CST 週二~週六)
      - 盤前預測 (08:00 CST)
      - 盤後總結 (14:15 CST)
      - 每日選股掃描 (19:00 CST)
      - 即時 TOP N 預覽 (手動觸發)
      - 回測 / 參數掃描 (手動觸發)
      - Collect Training Data (yfinance)
      - Train ML Model
      - 盤中事件監控 (09:00–13:30 CST)
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build scan data JSON
        working-directory: web
        run: node scripts/build-data.mjs

      - name: Build
        working-directory: web
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
