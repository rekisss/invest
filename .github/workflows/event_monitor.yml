name: 盤中事件監控 (09:00–13:30 CST)

on:
  schedule:
    - cron: "50 0 * * 1-5"    # UTC 00:50 = CST 08:50，提早10分鐘確保準時
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 300       # 270 分鐘 + 緩衝

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check market hours (CST 08:50–13:30 = UTC 00:50–05:30)
        id: market_check
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          TOTAL=$(( HOUR * 60 + MIN ))
          if [ "$TOTAL" -lt 50 ] || [ "$TOTAL" -gt 330 ]; then
            echo "Current UTC time is $(date -u +%H:%M), outside Taiwan market hours. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Market is open. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run event monitor
        if: steps.market_check.outputs.skip != 'true'
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode event-monitor \
            --stocks auto \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 10 \
            --top-n 5 \
            --workers 2 \
            --watch-top 5 \
            --max-price 120 \
            --prefer-lower-price \
            --include-news \
            --news-limit 2 \
            --interval-seconds 60 \
            --repeat-count 270 \
            --event-rise-threshold 0.045 \
            --event-drop-threshold -0.035 \
            --event-volume-multiplier 2.5 \
            --event-cooldown-seconds 600 \
            --heartbeat-minutes 30 \
            --output output \
            --notify

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **事件監控執行失敗** · $(date -u +%Y-%m-%d) · 請檢查 GitHub Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: Upload monitor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log-${{ github.run_id }}
          path: output/
          retention-days: 3
