name: 每日選股掃描 (20:00 CST)

on:
  schedule:
    - cron: "0 12 * * 1-5"    # UTC 12:00 = CST 20:00，週一至週五收盤後
    - cron: "0 12 * * 6"      # UTC 12:00 = CST 20:00，週六（用星期五資料，供週日選股參考）
  workflow_dispatch:            # 允許手動觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python main.py \
            --mode scan \
            --stocks auto \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 70 \
            --top-n 15 \
            --max-price 120 \
            --prefer-lower-price \
            --include-news \
            --news-limit 3 \
            --clean-cache \
            --clean-cache-days 14 \
            --output output \
            --notify

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **每日掃描執行失敗** · $(date -u +%Y-%m-%d) · 請檢查 GitHub Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ github.run_id }}
          path: output/
          retention-days: 7
