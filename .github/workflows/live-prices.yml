name: 盤中即時報價快取 (每3分鐘)

on:
  schedule:
    # Every 3 minutes during Taiwan market hours (01:00–05:30 UTC = 09:00–13:30 CST), Mon–Fri
    - cron: '*/3 1-5 * * 1-5'
    # Once at 06:00 UTC (14:00 CST) to capture final closing prices for next-day pre-market display
    - cron: '0 6 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

# 避免自身跑太久時前後兩輪重疊、同時搶推 data 分支。
concurrency:
  group: live-prices
  cancel-in-progress: false

jobs:
  cache-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch live prices
        run: |
          node - << 'NODESCRIPT'
          const https = require('https');
          const fs    = require('fs');

          // Common stocks always fetched regardless of scan data
          const ALWAYS = [
            '2330','2317','2303','2454','2412','2382','2357','2308','2002','1301',
            '1303','2882','2881','2886','2891','2884','2892','2885','2887','5880',
            '3481','2408','3034','3008','2409','2603','2609','2615','2618','2610',
            '6505','4904','1718','2059','2327','2474','3711','2301','2376','6669',
            '6770','2379','4938','3231','5483','2492','3533','6415','6456','2049',
          ];

          function isOTC(id) {
            const n = parseInt(id, 10);
            return (n >= 4200 && n <= 4999) || (n >= 5000 && n <= 5999) ||
                   (n >= 6000 && n <= 6999) || (n >= 7000 && n <= 7999) ||
                   (n >= 8000 && n <= 8999) || (n >= 9200 && n <= 9999);
          }
          function toYahoo(id) { return `${id}${isOTC(id) ? '.TWO' : '.TW'}`; }
          function parseNum(s) { return parseFloat(String(s ?? '').replace(/,/g, '')) || null; }
          function parseVol(s) { return parseInt(String(s  ?? '').replace(/,/g, '')) || 0; }

          function fetchJson(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, {
                headers: { 'User-Agent': 'Mozilla/5.0 (compatible; GitHubActions/price-cache)' },
                timeout: 15000,
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e) { reject(e); } });
                res.on('error', reject);
              });
              req.on('error', reject);
              req.on('timeout', () => { req.destroy(); reject(new Error('timeout')); });
            });
          }

          async function main() {
            let ids = [...ALWAYS];
            let scanTop = [];

            // Augment with latest scan stock list from deployed Pages
            try {
              const data = await fetchJson('https://rekisss.github.io/invest/data.json');
              const latest = (data?.dates || []).slice().sort().reverse()[0];
              if (latest) {
                scanTop = (data.scans?.[latest]?.top_stocks || [])
                  .slice(0, 120).map(s => String(s.stock_id));
                ids = [...new Set([...ids, ...scanTop])];
              }
              console.log(`Stock list: ${ids.length} symbols (${scanTop.length} from scan)`);
            } catch(e) {
              console.warn('data.json fetch failed:', e.message);
            }

            const prices = {};
            const twseIds = ids.filter(id => !isOTC(id));
            const tpexIds = ids.filter(id =>  isOTC(id));

            // ── Tier 1: TWSE/TPEX Official OpenAPI (primary — no auth, no IP blocking) ──
            if (twseIds.length > 0) {
              try {
                const data = await fetchJson('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                const idSet = new Set(twseIds);
                for (const item of (data || [])) {
                  if (!idSet.has(item.Code)) continue;
                  const price  = parseNum(item.ClosingPrice);
                  const change = parseNum(item.Change);
                  if (!price) continue;
                  const prev = (change != null && !isNaN(change)) ? price - change : null;
                  prices[item.Code] = {
                    price, prevClose: prev,
                    pct:    prev ? change / prev : null,
                    high:   parseNum(item.HighestPrice),
                    low:    parseNum(item.LowestPrice),
                    open:   parseNum(item.OpeningPrice),
                    volume: parseVol(item.TradeVolume),
                    time:   new Date().toISOString(),
                    isSnapshot: true,
                  };
                }
                const twseFilled = twseIds.filter(id => prices[id]).length;
                console.log(`TWSE: filled ${twseFilled}/${twseIds.length}`);
              } catch(e) {
                console.warn('TWSE official API error:', e.message);
              }
            }

            if (tpexIds.length > 0) {
              try {
                const data = await fetchJson('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes');
                const idSet = new Set(tpexIds);
                for (const item of (data || [])) {
                  const id = item.SecuritiesCompanyCode ?? item.Code;
                  if (!id || !idSet.has(id)) continue;
                  const price  = parseNum(item.Close ?? item.ClosingPrice);
                  const change = parseNum(item.Change);
                  if (!price) continue;
                  const prev = (change != null && !isNaN(change)) ? price - change : null;
                  prices[id] = {
                    price, prevClose: prev,
                    pct:    prev ? change / prev : null,
                    high:   parseNum(item.High ?? item.HighestPrice),
                    low:    parseNum(item.Low  ?? item.LowestPrice),
                    open:   parseNum(item.Open ?? item.OpeningPrice),
                    volume: parseVol(item.TradeVolume),
                    time:   new Date().toISOString(),
                    isSnapshot: true,
                  };
                }
                const tpexFilled = tpexIds.filter(id => prices[id]).length;
                console.log(`TPEX: filled ${tpexFilled}/${tpexIds.length}`);
              } catch(e) {
                console.warn('TPEX official API error:', e.message);
              }
            }

            // ── Tier 2: Yahoo Finance (fills remaining gaps, provides real-time ticks) ──
            const HOSTS = ['query2.finance.yahoo.com', 'query1.finance.yahoo.com'];
            const CHUNK = 20;
            // Try Yahoo for anything still missing (official APIs sometimes lag)
            const stillMissing = ids.filter(id => !prices[id]);
            if (stillMissing.length > 0) {
              for (let i = 0; i < stillMissing.length; i += CHUNK) {
                const chunk   = stillMissing.slice(i, i + CHUNK);
                const symbols = chunk.map(toYahoo).join(',');
                for (const host of HOSTS) {
                  try {
                    const url = `https://${host}/v7/finance/quote?symbols=${encodeURIComponent(symbols)}&fields=regularMarketPrice,regularMarketPreviousClose,regularMarketHigh,regularMarketLow,regularMarketOpen,regularMarketVolume,regularMarketTime,marketState`;
                    const json = await fetchJson(url);
                    const items = json?.quoteResponse?.result || [];
                    if (!items.length) continue;
                    for (const item of items) {
                      const id = (item.symbol || '').replace(/\.(TW|TWO)$/, '');
                      const price = item.regularMarketPrice;
                      if (!id || !price) continue;
                      const prev = item.regularMarketPreviousClose ?? null;
                      prices[id] = {
                        price, prevClose: prev,
                        pct:    prev ? (price - prev) / prev : null,
                        high:   item.regularMarketHigh   ?? null,
                        low:    item.regularMarketLow    ?? null,
                        open:   item.regularMarketOpen   ?? null,
                        volume: item.regularMarketVolume ?? 0,
                        time:   item.regularMarketTime
                                  ? new Date(item.regularMarketTime * 1000).toISOString()
                                  : '',
                        isSnapshot: item.marketState !== 'REGULAR',
                      };
                    }
                    if (chunk.some(id => prices[id])) break;
                  } catch(e) {
                    console.warn(`Yahoo ${host} error:`, e.message);
                  }
                }
              }
              const yahooFilled = stillMissing.filter(id => prices[id]).length;
              console.log(`Yahoo: filled ${yahooFilled}/${stillMissing.length} remaining gaps`);
            }

            // ── Indices: TWSE MI_INDEX (primary) → Yahoo fallback ────────────
            // Tier 1: TWSE official market index API
            // Returns array; find 發行量加權股價指數 (code Y) for TWII, 未含金融保險指數 etc.
            try {
              const idxData = await fetchJson('https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX');
              // Find 加權指數 (發行量加權股價指數) — 指數代號 Y or 代碼含 "發行量加權"
              for (const item of (idxData || [])) {
                const name = item.Index || item.指數名稱 || '';
                const val  = parseNum(item.ClosingIndex || item.收盤指數 || item.指數 || item.Value);
                const prev = parseNum(item.PreviousClosingIndex || item.前收指數 || item.PreviousIndex);
                const chg  = parseNum(item.Change || item.漲跌點數);
                if (!val) continue;
                // 發行量加權股價指數 = TWII
                if (name.includes('發行量加權') || name.includes('加權股價指數') || item.Code === 'Y') {
                  const p = prev || (chg != null ? val - chg : null);
                  prices['_idx_t00'] = {
                    price: val, prevClose: p,
                    change: chg ?? (p ? val - p : null),
                    pct:    p ? (val - p) / p : null,
                    time:   new Date().toISOString(),
                  };
                }
              }
              console.log(`TWSE index: t00=${!!prices['_idx_t00']}`);
            } catch(e) {
              console.warn('TWSE MI_INDEX error:', e.message);
            }

            // Tier 2: Yahoo fallback for any missing indices
            if (!prices['_idx_t00'] || !prices['_idx_o00']) {
              for (const host of HOSTS) {
                try {
                  const url = `https://${host}/v7/finance/quote?symbols=%5ETWII,%5ETPEX&fields=regularMarketPrice,regularMarketPreviousClose,regularMarketTime`;
                  const json = await fetchJson(url);
                  for (const item of json?.quoteResponse?.result || []) {
                    const price = item.regularMarketPrice;
                    if (!price) continue;
                    const prev = item.regularMarketPreviousClose ?? null;
                    const key  = item.symbol === '^TWII' ? '_idx_t00' : '_idx_o00';
                    if (prices[key]) continue; // already have it from TWSE
                    prices[key] = {
                      price, prevClose: prev,
                      change: prev != null ? price - prev : null,
                      pct:    prev ? (price - prev) / prev : null,
                      time:   item.regularMarketTime
                                ? new Date(item.regularMarketTime * 1000).toISOString()
                                : '',
                    };
                  }
                  if (prices['_idx_t00'] && prices['_idx_o00']) break;
                } catch(e) {
                  console.warn(`Index Yahoo ${host} error:`, e.message);
                }
              }
            }

            const stockCount = Object.keys(prices).filter(k => !k.startsWith('_')).length;
            console.log(`Total cached: ${stockCount} stocks, indices: ${!!prices['_idx_t00']}`);

            // 防退化守門:若本輪抓到的檔數異常少(TWSE/TPEX 暫時抓壞),不要用
            // 這份殘缺資料覆蓋上一份完整快取——保留舊的,等下一輪 API 恢復。
            // 門檻取「上一份的一半」與 20 檔的較大者,避免正常波動誤判。
            let prevCount = 0;
            try {
              const prev = JSON.parse(fs.readFileSync('live_prices.json', 'utf8'));
              prevCount = Object.keys(prev.prices || {}).filter(k => !k.startsWith('_')).length;
            } catch { /* 首次或壞檔 */ }
            const floor = Math.max(20, Math.floor(prevCount / 2));
            if (stockCount < floor && prevCount > 0) {
              console.warn(`本輪僅 ${stockCount} 檔(< 門檻 ${floor},上一份 ${prevCount} 檔)→ 保留舊快取不覆蓋`);
              return;
            }

            fs.writeFileSync('live_prices.json', JSON.stringify({
              updatedAt: new Date().toISOString(),
              prices,
            }));
          }

          main().catch(e => { console.error(e); process.exit(1); });
          NODESCRIPT

      - name: Commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add live_prices.json
          git diff --staged --quiet && { echo "無變化,不需推送"; exit 0; }
          git commit -m "prices $(TZ=Asia/Taipei date '+%H:%M:%S')"
          # 與 live-prices-shioaji.yml 共用 data 分支且同排程 → push 會互相 rejected。
          # 兩者寫不同檔,fetch+rebase 後重推必為 fast-forward、不衝突。
          for i in 1 2 3 4 5; do
            git push origin data && { echo "已推送"; exit 0; }
            echo "push 被拒(並發寫入)→ rebase 重試 $i"
            git fetch origin data && { git rebase origin/data || git rebase --abort; }
            sleep $((i * 2))
          done
          echo "快取 push 連續 5 次失敗" >&2
          exit 1
