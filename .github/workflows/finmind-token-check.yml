name: FinMind Token 健康檢查

# 檢查 9 把掃描用的 FinMind token:有效 / 額度滿 / 無效 / 未設定,並發 Discord 通知。
# 每日盤前自動跑一次(掃描出問題多半是 token 額度),也可手動觸發。
on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'   # 每日 22:30 UTC = 06:30 CST,盤前提醒

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install --quiet requests
      - name: 檢查 FinMind tokens
        env:
          FINMIND_TOKEN:   ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_2: ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3: ${{ secrets.FINMIND_TOKEN_3 }}
          FINMIND_TOKEN_4: ${{ secrets.FINMIND_TOKEN_4 }}
          FINMIND_TOKEN_5: ${{ secrets.FINMIND_TOKEN_5 }}
          FINMIND_TOKEN_6: ${{ secrets.FINMIND_TOKEN_6 }}
          FINMIND_TOKEN_7: ${{ secrets.FINMIND_TOKEN_7 }}
          FINMIND_TOKEN_8: ${{ secrets.FINMIND_TOKEN_8 }}
          FINMIND_TOKEN_9: ${{ secrets.FINMIND_TOKEN_9 }}
          FINMIND_TOKEN_10: ${{ secrets.FINMIND_TOKEN_10 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python finmind_token_check.py
