name: AI操盤日報

# 沒有 schedule:使用者的排程一律由外部服務(cron-job.org)透過
# workflow_dispatch API 觸發(建議:週一到週五 21:30 CST 每日一次)。
# POST https://api.github.com/repos/rekisss/invest/actions/workflows/daily_report.yml/dispatches
#   headers: Authorization: Bearer <PAT>, Accept: application/vnd.github+json
#   body: {"ref":"main"}
#
# 從已部署的 Pages data.json 產生 AI 操盤日報並發 Discord(戰績 vs 基準、
# 今日買賣、明日作戰計畫、規則排行)。只讀資料+通知,不寫 repo。
on:
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 產生並發送日報
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # AI 操盤手札(顯示層;無金鑰時自動跳過,不影響日報其餘內容)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 同步寫進 repo → 部署後顯示在網頁 AI操盤分頁(保留 14 份歷史)
          REPORT_FILE: output/ai_reports.json
        run: node web/scripts/daily-report.mjs

      - name: Commit 日報(推上 main 會自動觸發 Pages 部署)
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add output/ai_reports.json || true
          git diff --staged --quiet || git commit -m "report: AI操盤日報 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST"
          for i in 1 2 3 4; do
            git push && break
            sleep $((i * 5))
            git pull --rebase -X theirs origin main || true
          done
