name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -v 2>&1 | tail -20

      - name: Show installed packages
        run: pip list | grep -E "pandas|numpy|xgboost|yfinance|discord"

      - name: Run predictor tests
        run: python -u test_predictor.py

      - name: Syntax check main modules
        run: |
          python -c "import market_predictor; print('market_predictor OK')"
          python -c "import data_loader; print('data_loader OK')"
          python -c "import strategy; print('strategy OK')"
          python -c "import notifier; print('notifier OK')"
          python -c "import main; print('main OK')"
