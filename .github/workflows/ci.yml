name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show installed packages
        run: pip list | grep -E "pandas|numpy|xgboost|yfinance|discord" || true

      - name: Run predictor tests
        run: python -u test_predictor.py

      - name: Run fundamentals tests
        run: python -u test_fundamentals.py

      - name: Syntax check main modules
        run: |
          python -c "import market_predictor; print('market_predictor OK')"
          python -c "import data_loader; print('data_loader OK')"
          python -c "import strategy; print('strategy OK')"
          python -c "import notifier; print('notifier OK')"
          python -c "import main; print('main OK')"

      - name: Run pytest suite
        run: pip install pytest && python -m pytest tests/ -q --tb=short

  # 前端資料管線的 JS 單元測試(paper-trader 交易引擎等;node:test,零依賴不需 npm install)
  web-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run web script tests
        run: node --test web/scripts/*.test.mjs
