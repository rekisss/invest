name: 全市場掃描

# 架構：3 個平行 job，各帶自己的帳號掃 1/3 宇宙
# seg0(帳號1) + seg1(帳號2) + seg2(帳號3) 同時跑
# 每輪 ~360 支（3×120），5 輪涵蓋全部 1800 支（vs 單 job 8 輪）
# 每日 20:30 CST 由 full_market_aggregate.yml 彙整 TOP 20 → Discord

on:
  workflow_dispatch:
    inputs:
      force_rescan:
        description: "強制重置今日進度重新掃描"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    strategy:
      matrix:
        include:
          - seg: 0
          - seg: 1
          - seg: 2
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 110
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest scan progress
        run: git pull --rebase origin main || true

      - name: 強制重置今日進度（force_rescan=true 時）
        if: ${{ inputs.force_rescan == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          YESTERDAY=$(TZ=Asia/Taipei date -d 'yesterday' +%Y-%m-%d)
          # _attempted_ 進度檔（修正：* 必須在引號外才能展開 glob）
          rm -f output/full_scan/_attempted_${DATE}.csv
          rm -f output/full_scan/_attempted_${DATE}_seg*.csv
          # batch_seq 輸出（今天日期 + 昨天日期，因為 filename correction 會重命名）
          rm -f output/full_scan/batch_seq*_${DATE}.csv
          rm -f output/full_scan/batch_seq*_${DATE}.xlsx
          rm -f output/full_scan/batch_seq*_${YESTERDAY}.csv
          rm -f output/full_scan/batch_seq*_${YESTERDAY}.xlsx
          echo "已刪除今日進度 ${DATE}（含昨日 ${YESTERDAY} batch_seq）seg ${{ matrix.seg }}"
          # 只有 seg0 才發 Discord 通知（避免重複）
          if [ "${{ matrix.seg }}" = "0" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\": \"🔄 **已重置今日進度** · $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST · 3 段平行重新掃描\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 掃描 seg${{ matrix.seg }}（專用帳號，1/3 宇宙）
        continue-on-error: true
        env:
          FINMIND_TOKEN:   ${{ matrix.seg == 0 && secrets.FINMIND_TOKEN   || '' }}
          FINMIND_TOKEN_2: ${{ matrix.seg == 1 && secrets.FINMIND_TOKEN_2 || '' }}
          FINMIND_TOKEN_3: ${{ matrix.seg == 2 && secrets.FINMIND_TOKEN_3 || '' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode sequential-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 2 \
            --batch-index ${{ matrix.seg }} \
            --batch-count 3 \
            --output output

      - name: 上傳掃描 Excel（Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-seg${{ matrix.seg }}-${{ github.run_number }}
          path: output/full_scan/batch_seq${{ matrix.seg }}*.xlsx
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit 掃描進度
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase -X theirs origin main || true
          git add output/full_scan/ || true
          CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
          git diff --staged --quiet || git commit -m "scan: seg${{ matrix.seg }} ${CTS} CST"
          for i in 1 2 3 4; do
            git push && break
            sleep $((i * 10))
            git pull --rebase -X theirs origin main || true
            git add output/full_scan/ || true
            CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
            git diff --staged --quiet || git commit -m "scan: seg${{ matrix.seg }} ${CTS} CST" || true
          done

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **掃描失敗** seg${{ matrix.seg }} · $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
