name: 全市場掃描

# 架構：9 個平行 job，加權分配 1800 支股票
# 帳號 2-6（600/hr）× 256 支 = 1280 支 → ~51 分鐘（seg 0-4）
# 帳號 7-9（300/hr）× 130 支 =  390 支 → ~52 分鐘（seg 5-7）
# seg=8 使用 FINMIND_TOKEN（備用帳號），掃完剩餘 130 支
# 全部完成：約 52 分鐘（原 3 段需 ~2 小時）
# 每日 20:30 CST 由 full_market_aggregate.yml 彙整 TOP 20 → Discord

on:
  # 固定在「收盤後、FinMind 當日額度最足」的時間自動跑,取代傍晚手動觸發(那時額度常被
  # 用光導致半數分段失敗)。FinMind 免費額度每小時重置,所以每小時排一輪:第一輪盤後首掃,
  # 之後幾輪由下面的「自癒」步驟自動清掉『試過卻零產出』分段的進度,趁新額度重抓,直到補齊。
  schedule:
    - cron: '5 6 * * 1-5'    # 14:05 CST 盤後首掃(今日收盤已入庫、額度最新)
    - cron: '5 7 * * 1-5'    # 15:05 CST 自癒重掃(額度每小時重置)
    - cron: '5 8 * * 1-5'    # 16:05 CST 自癒重掃
    - cron: '5 9 * * 1-5'    # 17:05 CST 自癒重掃(最後一次)
  workflow_dispatch:
    inputs:
      force_rescan:
        description: "強制重置今日進度重新掃描"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    strategy:
      matrix:
        include:
          # 高額度帳號（600/hr）：每段 256 支，完成時間 ~51 分鐘
          - { seg: 0, start: 0,    size: 256 }
          - { seg: 1, start: 256,  size: 256 }
          - { seg: 2, start: 512,  size: 256 }
          - { seg: 3, start: 768,  size: 256 }
          - { seg: 4, start: 1024, size: 256 }
          # 低額度帳號（300/hr）：每段 130 支，完成時間 ~52 分鐘
          - { seg: 5, start: 1280, size: 130 }
          - { seg: 6, start: 1410, size: 130 }
          - { seg: 7, start: 1540, size: 130 }
          - { seg: 8, start: 1670, size: 130 }
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest scan progress
        run: git pull --rebase origin main || true

      - name: 自癒：清掉「試過卻零產出」分段的進度，讓本輪重抓（僅排程觸發）
        # 進度檔 _attempted 會把「抓失敗」的股票也記成試過，導致下一輪跳過→半數分段永遠空。
        # 這裡只針對「今日 batch CSV 完全沒有資料」的分段清掉它自己的進度檔，讓本輪重新抓取
        # （FinMind 額度每小時重置，前一輪額度滿的 token 這輪多半已恢復）。有資料的分段不動，
        # 正常續掃；也不刪任何 batch 資料。手動觸發維持原本 resume 行為（要重掃請用 force_rescan）。
        if: ${{ github.event_name == 'schedule' }}
        run: |
          SEG=${{ matrix.seg }}
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          CSV="output/full_scan/batch_seq${SEG}_${DATE}.csv"
          ROWS=0
          if [ -f "$CSV" ]; then
            ROWS=$(tail -n +2 "$CSV" | grep -c . || true)
          fi
          if [ "${ROWS:-0}" -eq 0 ]; then
            echo "seg${SEG} 今日 0 產出 → 清進度以便本輪重抓（token 額度可能已重置）"
            rm -f "output/full_scan/_attempted_${DATE}_seg${SEG}.csv"
          else
            echo "seg${SEG} 今日已有 ${ROWS} 支 → 保留進度，正常續掃"
          fi

      - name: 強制重置今日進度（force_rescan=true 時）
        if: ${{ inputs.force_rescan == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SEG=${{ matrix.seg }}
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          YESTERDAY=$(TZ=Asia/Taipei date -d 'yesterday' +%Y-%m-%d)
          rm -f output/full_scan/_attempted_${DATE}.csv
          rm -f output/full_scan/_attempted_${DATE}_seg*.csv
          rm -f output/full_scan/_attempted_${YESTERDAY}_seg${SEG}.csv
          rm -f output/full_scan/batch_seq${SEG}_${DATE}.csv
          rm -f output/full_scan/batch_seq${SEG}_${DATE}.xlsx
          rm -f output/full_scan/batch_seq${SEG}_${YESTERDAY}.csv
          rm -f output/full_scan/batch_seq${SEG}_${YESTERDAY}.xlsx
          echo "已刪除 seg${SEG} 進度 ${DATE}（含昨日 ${YESTERDAY}）"
          if [ "${{ matrix.seg }}" = "0" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\": \"🔄 **已重置今日進度** · $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST · 9 段平行重新掃描\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 掃描 seg${{ matrix.seg }}（專用帳號，加權分段）
        continue-on-error: true
        env:
          FINMIND_TOKEN:   ${{ matrix.seg == 8 && secrets.FINMIND_TOKEN   || '' }}
          FINMIND_TOKEN_2: ${{ matrix.seg == 0 && secrets.FINMIND_TOKEN_2 || '' }}
          FINMIND_TOKEN_3: ${{ matrix.seg == 1 && secrets.FINMIND_TOKEN_3 || '' }}
          FINMIND_TOKEN_4: ${{ matrix.seg == 2 && secrets.FINMIND_TOKEN_4 || '' }}
          FINMIND_TOKEN_5: ${{ matrix.seg == 3 && secrets.FINMIND_TOKEN_5 || '' }}
          FINMIND_TOKEN_6: ${{ matrix.seg == 4 && secrets.FINMIND_TOKEN_6 || '' }}
          FINMIND_TOKEN_7: ${{ matrix.seg == 5 && secrets.FINMIND_TOKEN_7 || '' }}
          FINMIND_TOKEN_8: ${{ matrix.seg == 6 && secrets.FINMIND_TOKEN_8 || '' }}
          FINMIND_TOKEN_9: ${{ matrix.seg == 7 && secrets.FINMIND_TOKEN_9 || '' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode sequential-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 2 \
            --batch-index ${{ matrix.seg }} \
            --batch-count 9 \
            --segment-start ${{ matrix.start }} \
            --segment-size ${{ matrix.size }} \
            --output output

      - name: 上傳掃描 Excel（Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-scan-seg${{ matrix.seg }}-${{ github.run_number }}
          path: output/full_scan/batch_seq${{ matrix.seg }}*.xlsx
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit 掃描進度
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase -X theirs origin main || true
          git add output/full_scan/ || true
          CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
          git diff --staged --quiet || git commit -m "scan: seg${{ matrix.seg }} ${CTS} CST"
          for i in 1 2 3 4; do
            git push && break
            sleep $((i * 10))
            git pull --rebase -X theirs origin main || true
            git add output/full_scan/ || true
            CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
            git diff --staged --quiet || git commit -m "scan: seg${{ matrix.seg }} ${CTS} CST" || true
          done

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **掃描失敗** seg${{ matrix.seg }} · $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST · 請檢查 Actions logs\"}" \
            "$DISCORD_WEBHOOK_URL" || true
