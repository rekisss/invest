name: 全市場掃描 (智能接力，每 2 小時)

# 每 2 小時啟動一輪：
#   1. 顯示目前掃描進度（已掃幾支）
#   2. 依序檢查 L → 950223 → rekis 的 API 配額
#   3. 有額度就繼續掃，沒有就換下一個
# 掃完的 Excel/CSV 上傳 Actions Artifacts 隨時可下載
# 彙整由 full_market_aggregate.yml 於 02:00 CST 負責

on:
  schedule:
    - cron: "0 7  * * 1-5"   # 15:00 CST
    - cron: "0 9  * * 1-5"   # 17:00 CST
    - cron: "0 11 * * 1-5"   # 19:00 CST
    - cron: "0 13 * * 1-5"   # 21:00 CST
    - cron: "0 15 * * 1-5"   # 23:00 CST
  workflow_dispatch:
    inputs:
      force_rescan:
        description: "強制全部重掃（true=清除現有批次重新開始）"
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: 強制重掃（若要求）
        if: github.event.inputs.force_rescan == 'true'
        run: |
          rm -f output/full_scan/batch_*.csv output/full_scan/batch_*.xlsx || true
          echo "已清除所有批次，重新掃描"

      # 智能掃描：先看進度 + 配額，再依序 L → 950223 → rekis 接力
      - name: 智能接力掃描
        continue-on-error: true
        env:
          FINMIND_TOKEN:   ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_2: ${{ secrets.FINMIND_TOKEN_2 }}
          FINMIND_TOKEN_3: ${{ secrets.FINMIND_TOKEN_3 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode smart-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 4 \
            --output output

      # 上傳 Excel 為 Artifact（Actions → 本次 Run → Artifacts 下載）
      - name: 上傳批次 Excel（Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: output/full_scan/batch_*.xlsx
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit 掃描結果
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add output/full_scan/ || true
          git diff --staged --quiet || git commit -m \
            "scan: 智能掃描 $(TZ=Asia/Taipei date +%Y-%m-%d) $(TZ=Asia/Taipei date +%H:%M)" || true
          git push || (sleep 5 && git pull --rebase origin main && git push) || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場掃描失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d %H:%M) CST · 請至 Actions 查看\"}" \
            "$DISCORD_WEBHOOK_URL" || true
