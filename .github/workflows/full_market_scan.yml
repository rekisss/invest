name: 全市場掃描

# 3 個平行 Job，各用不同 runner（不同 IP），workers=2，約 20-30 分鐘掃完全部 1800 支

on:
  workflow_dispatch:
    inputs:
      force_rescan:
        description: "強制重置今日進度重新掃描"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - segment: 0
          - segment: 1
          - segment: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest scan progress
        run: git pull --rebase origin main || true

      - name: 強制重置今日進度（force_rescan=true 時）
        if: ${{ inputs.force_rescan == 'true' }}
        run: |
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          rm -f "output/full_scan/_attempted_${DATE}.csv"
          rm -f "output/full_scan/batch_seq"*"_${DATE}.csv"
          rm -f "output/full_scan/batch_seq"*"_${DATE}.xlsx"
          echo "已刪除今日進度，將完全重新掃描"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 掃描（segment ${{ matrix.segment }}/3）
        continue-on-error: true
        env:
          # 每個 job 只給自己的 token，不跨帳號
          FINMIND_TOKEN: >-
            ${{ matrix.segment == 0 && secrets.FINMIND_TOKEN ||
                matrix.segment == 1 && secrets.FINMIND_TOKEN_2 ||
                secrets.FINMIND_TOKEN_3 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode sequential-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 2 \
            --batch-index ${{ matrix.segment }} \
            --batch-count 3 \
            --output output

      - name: 上傳掃描 Excel（Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-seg${{ matrix.segment }}-${{ github.run_number }}
          path: output/full_scan/batch_seq*.xlsx
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit 掃描進度
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase -X theirs origin main || true
          git add output/full_scan/ || true
          CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
          git diff --staged --quiet || git commit -m "scan: seg${{ matrix.segment }} ${CTS} CST"
          for i in 1 2 3 4; do
            git push && break
            sleep $((i * 15))
            git pull --rebase -X theirs origin main || true
            git add output/full_scan/ || true
            CTS=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
            git diff --staged --quiet || git commit -m "scan: seg${{ matrix.segment }} ${CTS} CST" || true
          done

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **掃描失敗 seg${{ matrix.segment }}** · $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') CST\"}" \
            "$DISCORD_WEBHOOK_URL" || true
