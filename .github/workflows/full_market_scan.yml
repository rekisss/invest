name: 全市場掃描 (接力模式，每 2 小時三帳號輪流)

# 每 2 小時啟動一輪：L → 950223 → rekis 依序接力掃描
# 每個帳號掃到 API 配額耗盡為止，下一帳號從斷點繼續
# 掃完後彙整由 full_market_aggregate.yml 於 02:00 CST 負責
# 排程：CST 15:00, 17:00, 19:00, 21:00, 23:00 = UTC 07, 09, 11, 13, 15

on:
  schedule:
    - cron: "0 7  * * 1-5"   # 15:00 CST
    - cron: "0 9  * * 1-5"   # 17:00 CST
    - cron: "0 11 * * 1-5"   # 19:00 CST
    - cron: "0 13 * * 1-5"   # 21:00 CST
    - cron: "0 15 * * 1-5"   # 23:00 CST
  workflow_dispatch:
    inputs:
      force_rescan:
        description: "強制全部重掃（true=清除現有批次重新開始）"
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest batch results
        run: git pull --rebase origin main || true

      - name: 強制重掃（若要求）
        if: github.event.inputs.force_rescan == 'true'
        run: |
          rm -f output/full_scan/batch_*.csv output/full_scan/batch_*.xlsx || true
          echo "已清除所有批次，重新掃描"

      # ─── 帳號 L ───────────────────────────────────────────────
      - name: 掃描 L 帳號（掃到配額耗盡）
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode continue-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 4 \
            --output output

      - name: Commit L 帳號結果
        continue-on-error: true
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add -f output/full_scan/ || true
          git diff --staged --quiet || git commit -m \
            "scan: L帳號接力 $(TZ=Asia/Taipei date +%Y-%m-%d) $(TZ=Asia/Taipei date +%H:%M)" || true
          git push || (sleep 5 && git pull --rebase origin main && git push) || true

      # ─── 帳號 950223 ──────────────────────────────────────────
      - name: 掃描 950223 帳號（接續 L，掃到配額耗盡）
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN_2 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode continue-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 4 \
            --output output

      - name: Commit 950223 帳號結果
        continue-on-error: true
        run: |
          git pull --rebase origin main || true
          git add -f output/full_scan/ || true
          git diff --staged --quiet || git commit -m \
            "scan: 950223帳號接力 $(TZ=Asia/Taipei date +%Y-%m-%d) $(TZ=Asia/Taipei date +%H:%M)" || true
          git push || (sleep 5 && git pull --rebase origin main && git push) || true

      # ─── 帳號 rekis ───────────────────────────────────────────
      - name: 掃描 rekis 帳號（接續 950223，掃到配額耗盡）
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN_3 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py \
            --mode continue-scan \
            --end $(TZ=Asia/Taipei date +%Y-%m-%d) \
            --lookback-days 420 \
            --max-universe 1800 \
            --top-n 50 \
            --workers 4 \
            --output output

      - name: Commit rekis 帳號結果
        continue-on-error: true
        run: |
          git pull --rebase origin main || true
          git add -f output/full_scan/ || true
          git diff --staged --quiet || git commit -m \
            "scan: rekis帳號接力 $(TZ=Asia/Taipei date +%Y-%m-%d) $(TZ=Asia/Taipei date +%H:%M)" || true
          git push || (sleep 5 && git pull --rebase origin main && git push) || true

      # ─── 失敗通知 ─────────────────────────────────────────────
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **全市場掃描失敗** · $(TZ=Asia/Taipei date +%Y-%m-%d %H:%M) CST · 請至 Actions 查看\"}" \
            "$DISCORD_WEBHOOK_URL" || true
