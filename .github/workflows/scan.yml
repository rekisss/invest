name: Taiwan Daily Scan

on:
  workflow_dispatch:
  schedule:
    # 13:45 Asia/Taipei on weekdays, after the cash session close.
    - cron: "45 5 * * 1-5"

concurrency:
  group: taiwan-daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          TZ: Asia/Taipei
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py --mode scan --stocks auto --end "$(date +%F)" --max-universe 40 --top-n 15 --max-price 120 --prefer-lower-price --output output --notify

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-daily-scan
          path: |
            output/scan_report.xlsx
          if-no-files-found: warn
