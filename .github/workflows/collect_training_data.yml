name: Collect Training Data (yfinance)

on:
  workflow_dispatch:
    inputs:
      period:
        description: "回溯期間（1y / 2y / 3y / 5y）"
        required: false
        default: "3y"
        type: choice
        options:
          - "1y"
          - "2y"
          - "3y"
          - "5y"
      max_stocks:
        description: "最大股票數（0 = 全部 ~1700 支，測試可填 20）"
        required: false
        default: "0"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect historical training data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python collect_training_data.py \
            --period "${{ inputs.period }}" \
            --batch-size 80 \
            --output training_data \
            --max-stocks "${{ inputs.max_stocks }}"

      - name: Upload training data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-data-${{ inputs.period }}-${{ github.run_id }}
          path: training_data/*.csv
          retention-days: 30
          if-no-files-found: error
