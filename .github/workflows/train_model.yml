name: Train ML Model

on:
  workflow_dispatch:
    inputs:
      target:
        description: "預測目標"
        required: false
        default: "label_5d"
        type: choice
        options:
          - "label_5d"
          - "label_10d"
      data_file:
        description: "指定 parquet 檔名（留空 = 自動用最新檔）"
        required: false
        default: ""
  # 資料收集完後可手動觸發此 workflow

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: |
          DATA_ARG=""
          if [ -n "${{ inputs.data_file }}" ]; then
            DATA_ARG="--data training_data/${{ inputs.data_file }}"
          fi
          python train_model.py \
            --target "${{ inputs.target }}" \
            --output models \
            $DATA_ARG

      - name: Commit model to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git diff --cached --quiet || git commit -m \
            "model: retrain ${{ inputs.target }} $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
